name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: true
        type: string

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ""
          - goos: linux
            goarch: arm64
            suffix: ""
          - goos: darwin
            goarch: amd64
            suffix: ""
          - goos: darwin
            goarch: arm64
            suffix: ""
          - goos: windows
            goarch: amd64
            suffix: ".exe"
          - goos: windows
            goarch: arm64
            suffix: ".exe"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags="-s -w -X main.version=${{ inputs.version }}" -o "jwtd${{ matrix.suffix }}" .
          tar czf "jwtd-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" "jwtd${{ matrix.suffix }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jwtd-${{ matrix.goos }}-${{ matrix.goarch }}
          path: jwtd-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --draft \
            --title "v${{ inputs.version }}" \
            --generate-notes \
            artifacts/*

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate formula
        run: |
          SHA256_DARWIN_AMD64=$(sha256sum artifacts/jwtd-darwin-amd64.tar.gz | cut -d ' ' -f 1)
          SHA256_DARWIN_ARM64=$(sha256sum artifacts/jwtd-darwin-arm64.tar.gz | cut -d ' ' -f 1)
          SHA256_LINUX_AMD64=$(sha256sum artifacts/jwtd-linux-amd64.tar.gz | cut -d ' ' -f 1)
          SHA256_LINUX_ARM64=$(sha256sum artifacts/jwtd-linux-arm64.tar.gz | cut -d ' ' -f 1)

          sed \
            -e "s/VERSION/${{ inputs.version }}/g" \
            -e "s/SHA256_DARWIN_ARM64/$SHA256_DARWIN_ARM64/g" \
            -e "s/SHA256_DARWIN_AMD64/$SHA256_DARWIN_AMD64/g" \
            -e "s/SHA256_LINUX_ARM64/$SHA256_LINUX_ARM64/g" \
            -e "s/SHA256_LINUX_AMD64/$SHA256_LINUX_AMD64/g" \
            Formula/jwtd.rb > jwtd.rb

      - name: Push to homebrew-tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/webcodr/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp jwtd.rb tap/Formula/jwtd.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/jwtd.rb
          git commit -m "jwtd ${{ inputs.version }}"
          git push
