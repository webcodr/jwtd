name: release
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: true
        type: string

concurrency:
  group: release-${{ github.repository }}-${{ github.ref }}-${{ inputs.version }}
  cancel-in-progress: false
permissions:
  contents: read
env:
  VERSION: '${{ inputs.version }}'
jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      prerelease: ${{ steps.classify.outputs.prerelease }}
    steps:
      - name: Validate release ref
        if: github.ref != 'refs/heads/main'
        run: |
          echo "Releases must be dispatched from main" >&2
          exit 1
      - name: Validate semantic version
        shell: bash
        run: |
          semver_re='^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*|[0-9]*[A-Za-z-][0-9A-Za-z-]*)(\.(0|[1-9][0-9]*|[0-9]*[A-Za-z-][0-9A-Za-z-]*))*))?(\+([0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*))?$'
          if [[ ! "$VERSION" =~ $semver_re ]]; then
            echo "Invalid semantic version: $VERSION" >&2
            exit 1
          fi
      - name: Classify release
        id: classify
        shell: bash
        run: |
          version_without_build="${VERSION%%+*}"
          if [[ "$version_without_build" == *-* ]]; then
            echo 'prerelease=true' >> "$GITHUB_OUTPUT"
          else
            echo 'prerelease=false' >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "gofmt needed on:" >&2
            echo "$unformatted" >&2
            exit 1
          fi
      - name: Vet
        run: go vet ./...
      - name: Run tests
        run: go test ./...
  build:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Keyless Cosign exchanges this OIDC token for a short-lived
      # certificate. It grants no repository write access, so GoReleaser still
      # cannot publish anything.
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
      - name: Tag version for GoReleaser
        run: |
          tag="v$VERSION"
          git tag --force "$tag" "$GITHUB_SHA"
      - name: Build with GoReleaser
        env:
          GORELEASER_CURRENT_TAG: v${{ env.VERSION }}
        run: goreleaser release --clean --skip=publish
      - name: Verify and stage GoReleaser artifacts
        run: |
          expected_archives=(
            "jwtd-linux-amd64.tar.gz"
            "jwtd-linux-arm64.tar.gz"
            "jwtd-darwin-amd64.tar.gz"
            "jwtd-darwin-arm64.tar.gz"
            "jwtd-windows-amd64.tar.gz"
            "jwtd-windows-arm64.tar.gz"
          )

          expected_sboms=()
          for archive in "${expected_archives[@]}"; do
            expected_sboms+=("$archive.sbom.json")
          done

          expected_packages=(
            "jwtd-linux-amd64.deb"
            "jwtd-linux-arm64.deb"
            "jwtd-linux-amd64.rpm"
            "jwtd-linux-arm64.rpm"
          )

          expected_assets=(
            "${expected_archives[@]}"
            "checksums.txt"
            "checksums.txt.sigstore.json"
            "${expected_sboms[@]}"
            "${expected_packages[@]}"
          )

          actual_archives=$(jq -r '[.[] | select(.type == "Archive") | .name] | sort | .[]' dist/artifacts.json)
          expected_archives_sorted=$(printf '%s\n' "${expected_archives[@]}" | sort)
          if [ "$actual_archives" != "$expected_archives_sorted" ]; then
            echo "Unexpected archive set in dist/artifacts.json:" >&2
            echo "$actual_archives" >&2
            exit 1
          fi

          checksum_names=$(jq -r '[.[] | select(.type == "Checksum") | .name] | .[]' dist/artifacts.json)
          if [ "$checksum_names" != "checksums.txt" ]; then
            echo "Expected exactly one checksums.txt Checksum artifact, got:" >&2
            echo "$checksum_names" >&2
            exit 1
          fi

          actual_sboms=$(jq -r '[.[] | select(.type == "SBOM") | .name] | sort | .[]' dist/artifacts.json)
          expected_sboms_sorted=$(printf '%s\n' "${expected_sboms[@]}" | sort)
          if [ "$actual_sboms" != "$expected_sboms_sorted" ]; then
            echo "Unexpected SBOM set in dist/artifacts.json:" >&2
            echo "$actual_sboms" >&2
            exit 1
          fi

          signature_names=$(jq -r '[.[] | select(.type == "Signature") | .name] | .[]' dist/artifacts.json)
          if [ "$signature_names" != "checksums.txt.sigstore.json" ]; then
            echo "Expected exactly one checksums.txt.sigstore.json Signature artifact, got:" >&2
            echo "$signature_names" >&2
            exit 1
          fi

          actual_packages=$(jq -r '[.[] | select(.type == "Linux Package") | .name] | sort | .[]' dist/artifacts.json)
          expected_packages_sorted=$(printf '%s\n' "${expected_packages[@]}" | sort)
          if [ "$actual_packages" != "$expected_packages_sorted" ]; then
            echo "Unexpected Linux package set in dist/artifacts.json:" >&2
            echo "$actual_packages" >&2
            exit 1
          fi

          scoop_names=$(jq -r '[.[] | select(.type == "Scoop Manifest") | .name] | .[]' dist/artifacts.json)
          if [ "$scoop_names" != "jwtd.json" ]; then
            echo "Expected exactly one jwtd.json Scoop Manifest artifact, got:" >&2
            echo "$scoop_names" >&2
            exit 1
          fi

          mkdir -p staging/release staging/manifests
          for asset in "${expected_assets[@]}"; do
            case "$asset" in
              *windows*.tar.gz) expected_entry="jwtd.exe" ;;
              *.tar.gz) expected_entry="jwtd" ;;
              *) expected_entry="" ;;
            esac
            if [ -n "$expected_entry" ]; then
              entries=$(tar -tzf "dist/$asset")
              if [ "$entries" != "$expected_entry" ]; then
                echo "Archive $asset must contain only $expected_entry, got:" >&2
                echo "$entries" >&2
                exit 1
              fi
            fi
            cp "dist/$asset" "staging/release/$asset"
          done

          # The Scoop manifest is a downstream input, never a release asset. It
          # is staged separately so the release job cannot upload it.
          scoop_path=$(jq -r '.[] | select(.type == "Scoop Manifest") | .path' dist/artifacts.json)
          cp "$scoop_path" staging/manifests/jwtd.json

          # checksums.txt covers the archives and Linux packages, so it must
          # verify cleanly even though the directory also holds SBOMs and the
          # signature bundle.
          (cd staging/release && sha256sum --check checksums.txt)
      - name: Upload release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jwtd-release-assets
          path: staging/release/*
      - name: Upload manifests
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jwtd-manifests
          path: staging/manifests/*
  release:
    needs: [validate, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      # Provides the mise-pinned cosign used to verify the published bundle.
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
      # Only the release assets are downloaded here. Downstream manifests such
      # as the Homebrew cask travel in a separate artifact and must never be
      # uploaded to the GitHub release.
      - name: Download release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: jwtd-release-assets
          path: artifacts
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PRERELEASE: ${{ needs.validate.outputs.prerelease }}
        run: |
          tag="v$VERSION"
          if ! git ls-remote --exit-code origin "refs/tags/$tag" >/dev/null 2>&1; then
            if create_response=$(gh api --include --method POST "repos/$GH_REPO/git/refs" \
              -f ref="refs/tags/$tag" \
              -f sha="$GITHUB_SHA" 2>&1); then
              :
            elif [[ "$create_response" != *" 422 "* ]]; then
              echo "$create_response" >&2
              exit 1
            fi
          fi

          git fetch --force origin "refs/tags/$tag:refs/tags/$tag"
          tag_sha=$(git rev-parse --verify "refs/tags/$tag^{commit}")
          if [ "$tag_sha" != "$GITHUB_SHA" ]; then
            echo "Tag $tag points to $tag_sha, expected $GITHUB_SHA" >&2
            exit 1
          fi

          latest_flag=()
          if [ "$PRERELEASE" = "true" ]; then
            latest_flag+=(--latest=false)
          else
            requested="v${VERSION%%+*}"
            stable_tags=$(git ls-remote --tags origin 'refs/tags/v*' | awk '{print $2}' | sed 's|^refs/tags/||' | grep -E '^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$' || true)
            highest=$(printf '%s\n%s\n' "$stable_tags" "$requested" | sed '/^$/d' | sort -uV | tail -n 1)
            if [ "$highest" != "$requested" ]; then
              latest_flag+=(--latest=false)
            fi
          fi

          expected_assets=(
            "jwtd-linux-amd64.tar.gz"
            "jwtd-linux-arm64.tar.gz"
            "jwtd-darwin-amd64.tar.gz"
            "jwtd-darwin-arm64.tar.gz"
            "jwtd-windows-amd64.tar.gz"
            "jwtd-windows-arm64.tar.gz"
            "checksums.txt"
            "checksums.txt.sigstore.json"
            "jwtd-linux-amd64.tar.gz.sbom.json"
            "jwtd-linux-arm64.tar.gz.sbom.json"
            "jwtd-darwin-amd64.tar.gz.sbom.json"
            "jwtd-darwin-arm64.tar.gz.sbom.json"
            "jwtd-windows-amd64.tar.gz.sbom.json"
            "jwtd-windows-arm64.tar.gz.sbom.json"
            "jwtd-linux-amd64.deb"
            "jwtd-linux-arm64.deb"
            "jwtd-linux-amd64.rpm"
            "jwtd-linux-arm64.rpm"
          )

          # Keyless Cosign bundles carry a fresh certificate and timestamp, and
          # Syft SBOMs embed a random documentNamespace UUID and creation
          # timestamp. Neither is byte-reproducible, so they are verified by
          # presence, exact count, and (for the bundle) cryptographic validity
          # rather than byte equality. The six archives and checksums.txt stay
          # in the strict cmp tier, keeping published releases provably
          # immutable.
          nonreproducible_assets=(
            "checksums.txt.sigstore.json"
            "jwtd-linux-amd64.tar.gz.sbom.json"
            "jwtd-linux-arm64.tar.gz.sbom.json"
            "jwtd-darwin-amd64.tar.gz.sbom.json"
            "jwtd-darwin-arm64.tar.gz.sbom.json"
            "jwtd-windows-amd64.tar.gz.sbom.json"
            "jwtd-windows-arm64.tar.gz.sbom.json"
          )

          is_nonreproducible() {
            local candidate="$1"
            local asset
            for asset in "${nonreproducible_assets[@]}"; do
              if [ "$asset" = "$candidate" ]; then
                return 0
              fi
            done
            return 1
          }

          verify_release_assets() {
            local verified_assets
            local downloaded_count
            verified_assets=$(mktemp -d)
            gh release download "$tag" --dir "$verified_assets"
            for asset in "${expected_assets[@]}"; do
              if [ ! -f "$verified_assets/$asset" ]; then
                echo "Release $tag is missing asset $asset" >&2
                rm -rf "$verified_assets"
                exit 1
              fi
              if is_nonreproducible "$asset"; then
                continue
              fi
              if ! cmp -- "$verified_assets/$asset" "artifacts/$asset"; then
                echo "Release $tag asset $asset does not match the build artifact" >&2
                rm -rf "$verified_assets"
                exit 1
              fi
            done

            # The published checksums.txt is byte-identical to the build
            # artifact above, so verifying the published bundle against it
            # proves the signature covers exactly the archives being shipped.
            if ! cosign verify-blob \
              --bundle "$verified_assets/checksums.txt.sigstore.json" \
              --certificate-identity-regexp "^https://github.com/$GH_REPO/\.github/workflows/release\.yml@" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              "$verified_assets/checksums.txt"; then
              echo "Release $tag Cosign bundle does not verify against checksums.txt" >&2
              rm -rf "$verified_assets"
              exit 1
            fi
            downloaded_count=$(find "$verified_assets" -maxdepth 1 -type f | wc -l)
            if [ "$downloaded_count" -ne "${#expected_assets[@]}" ]; then
              echo "Release $tag has unexpected assets" >&2
              rm -rf "$verified_assets"
              exit 1
            fi
            rm -rf "$verified_assets"
          }

          # RELEASE_NOTES.md holds hand-written prose for the next release; when
          # present and non-empty it is prepended to the auto-generated notes.
          # Clear it after a release so its contents do not repeat.
          notes_flag=()
          if [ -s RELEASE_NOTES.md ]; then
            notes_flag+=(--notes-file RELEASE_NOTES.md)
          fi

          if ! gh release view "$tag" >/dev/null 2>&1; then
            create_succeeded=true
            gh release create "v$VERSION" \
              --verify-tag \
              --title "$tag" \
              --generate-notes \
              "${notes_flag[@]}" \
              --draft \
              --prerelease="$PRERELEASE" \
              "${latest_flag[@]}" || create_succeeded=false
            if [ "$create_succeeded" != "true" ]; then
              echo "Release creation failed; checking for a concurrent creator" >&2
            fi
            release_found=false
            for attempt in 1 2 3 4 5; do
              if gh release view "$tag" >/dev/null 2>&1; then
                release_found=true
                break
              fi
              sleep "$attempt"
            done
            if [ "$release_found" != "true" ]; then
              echo "Release $tag was not available after bounded retries" >&2
              exit 1
            fi
          fi

          release_state=$(gh release view "$tag" --json isDraft,isPrerelease --jq '[.isDraft, .isPrerelease] | @tsv')
          IFS=$'\t' read -r is_draft is_prerelease <<< "$release_state"
          if [[ "$is_draft" != "true" && "$is_draft" != "false" ]] || [[ "$is_prerelease" != "true" && "$is_prerelease" != "false" ]]; then
            echo "Invalid release state for $tag: $release_state" >&2
            exit 1
          fi

          if [ "$is_draft" = "true" ]; then
            gh release upload "$tag" artifacts/* --clobber
            verify_release_assets
            gh release edit "$tag" \
              --title "$tag" \
              --draft=false \
              --prerelease="$PRERELEASE" \
              "${latest_flag[@]}"
          elif [ "$is_prerelease" != "$PRERELEASE" ]; then
            echo "Published release $tag has prerelease state $is_prerelease, expected $PRERELEASE" >&2
            exit 1
          else
            verify_release_assets
          fi

          final_state=$(gh release view "$tag" --json isDraft,isPrerelease --jq '[.isDraft, .isPrerelease] | @tsv')
          IFS=$'\t' read -r final_draft final_prerelease <<< "$final_state"
          if [ "$final_draft" != "false" ] || [ "$final_prerelease" != "$PRERELEASE" ]; then
            echo "Release $tag final state is invalid: $final_state" >&2
            exit 1
          fi
  update-homebrew:
    needs: [validate, release]
    if: needs.validate.outputs.prerelease == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Download release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: jwtd-release-assets
          path: artifacts
      - name: Render formula
        run: |
          # Take the hashes from the signed checksums.txt rather than
          # re-hashing, so the formula can only point at the exact archives
          # this release published and verified.
          sha_for() {
            local name="$1" sha
            sha=$(awk -v f="$name" '$2 == f { print $1 }' artifacts/checksums.txt)
            if [ ${#sha} -ne 64 ]; then
              echo "No sha256 for $name in checksums.txt" >&2
              exit 1
            fi
            printf '%s' "$sha"
          }

          SHA256_DARWIN_AMD64=$(sha_for jwtd-darwin-amd64.tar.gz)
          SHA256_DARWIN_ARM64=$(sha_for jwtd-darwin-arm64.tar.gz)
          SHA256_LINUX_AMD64=$(sha_for jwtd-linux-amd64.tar.gz)
          SHA256_LINUX_ARM64=$(sha_for jwtd-linux-arm64.tar.gz)

          sed \
            -e "s/VERSION/$VERSION/g" \
            -e "s/SHA256_DARWIN_ARM64/$SHA256_DARWIN_ARM64/g" \
            -e "s/SHA256_DARWIN_AMD64/$SHA256_DARWIN_AMD64/g" \
            -e "s/SHA256_LINUX_ARM64/$SHA256_LINUX_ARM64/g" \
            -e "s/SHA256_LINUX_AMD64/$SHA256_LINUX_AMD64/g" \
            Formula/jwtd.rb > jwtd.rb

          if grep -qE 'VERSION|SHA256_' jwtd.rb; then
            echo "Formula still contains unrendered placeholders" >&2
            exit 1
          fi
      - name: Push to homebrew-tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          gh auth setup-git
          git clone "https://github.com/webcodr/homebrew-tap.git" tap
          mkdir -p tap/Formula
          current_formula="tap/Formula/jwtd.rb"
          if [ -f "$current_formula" ]; then
            current_version=$(ruby -e 'ARGF.each_line { |line| puts Regexp.last_match(1) if line =~ /^\s*version\s+"([^"]+)"/ }' "$current_formula")
            if [ -z "$current_version" ]; then
              echo "Could not determine current Homebrew formula version" >&2
              exit 1
            fi
            if ruby -rrubygems -e 'current = Gem::Version.new(ARGV[0].split("+", 2).first); requested = Gem::Version.new(ARGV[1].split("+", 2).first); exit(current > requested ? 0 : 1)' "$current_version" "$VERSION"; then
              echo "Homebrew tap version $current_version is newer than requested $VERSION; skipping"
              exit 0
            fi
          fi
          cp jwtd.rb tap/Formula/jwtd.rb
          cd tap
          # Remove the superseded cask so the tap does not expose both a cask
          # and a formula named jwtd (transition away from the 4.0.0 cask).
          if [ -f Casks/jwtd.rb ]; then
            git rm --quiet Casks/jwtd.rb
          fi
          git add Formula/jwtd.rb
          if git diff --cached --quiet; then
            echo "Homebrew formula is already current"
            exit 0
          else
            diff_status=$?
            if [ "$diff_status" -ne 1 ]; then
              exit "$diff_status"
            fi
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "jwtd $VERSION"
          git push
  update-scoop:
    needs: [validate, release]
    if: needs.validate.outputs.prerelease == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Download release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: jwtd-release-assets
          path: artifacts
      - name: Download manifests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: jwtd-manifests
          path: manifests
      - name: Verify manifest against checksums
        run: |
          # Cross-check every hash in the Scoop manifest against the signed
          # checksums.txt, so the bucket can only point at the exact archives
          # this release published.
          pairs=$(jq -r '.architecture | to_entries[] | "\(.value.hash)  \(.value.url | split("/") | last)"' manifests/jwtd.json | sort)

          pair_count=$(printf '%s\n' "$pairs" | grep -c .)
          if [ "$pair_count" -ne 2 ]; then
            echo "Expected 2 hash/archive pairs in the Scoop manifest, got $pair_count:" >&2
            printf '%s\n' "$pairs" >&2
            exit 1
          fi

          while IFS= read -r pair; do
            if ! grep -qxF "$pair" artifacts/checksums.txt; then
              echo "Scoop manifest entry does not match checksums.txt: $pair" >&2
              exit 1
            fi
          done <<< "$pairs"

          echo "Scoop manifest hashes match checksums.txt:"
          printf '%s\n' "$pairs"
      - name: Push to scoop-bucket
        env:
          GH_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
        run: |
          gh auth setup-git
          git clone "https://github.com/webcodr/scoop-bucket.git" bucket
          current_manifest="bucket/jwtd.json"
          if [ -f "$current_manifest" ]; then
            current_version=$(jq -r '.version // empty' "$current_manifest")
            if [ -z "$current_version" ]; then
              echo "Could not determine current Scoop manifest version" >&2
              exit 1
            fi
            if ruby -rrubygems -e 'current = Gem::Version.new(ARGV[0].split("+", 2).first); requested = Gem::Version.new(ARGV[1].split("+", 2).first); exit(current > requested ? 0 : 1)' "$current_version" "$VERSION"; then
              echo "Scoop bucket version $current_version is newer than requested $VERSION; skipping"
              exit 0
            fi
          fi
          cp manifests/jwtd.json bucket/jwtd.json
          cd bucket
          git add jwtd.json
          if git diff --cached --quiet; then
            echo "Scoop manifest is already current"
            exit 0
          else
            diff_status=$?
            if [ "$diff_status" -ne 1 ]; then
              exit "$diff_status"
            fi
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "jwtd $VERSION"
          git push
  update-aur:
    needs: [validate, release]
    if: needs.validate.outputs.prerelease == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Download release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: jwtd-release-assets
          path: artifacts
      - name: Render PKGBUILD and .SRCINFO
        run: |
          # Take the archive hashes from the signed checksums.txt rather than
          # re-hashing, so the AUR package can only point at the exact archives
          # this release published and verified.
          sha_for() {
            local name="$1" sha
            sha=$(awk -v f="$name" '$2 == f { print $1 }' artifacts/checksums.txt)
            if [ ${#sha} -ne 64 ]; then
              echo "No sha256 for $name in checksums.txt" >&2
              exit 1
            fi
            printf '%s' "$sha"
          }

          SHA256_LINUX_AMD64=$(sha_for jwtd-linux-amd64.tar.gz)
          SHA256_LINUX_ARM64=$(sha_for jwtd-linux-arm64.tar.gz)
          # The LICENSE is not a release archive, so it is not in checksums.txt.
          # Hash the copy at this release commit; it is byte-identical to the
          # tagged raw.githubusercontent.com file the PKGBUILD downloads.
          SHA256_LICENSE=$(sha256sum LICENSE | cut -d' ' -f1)

          mkdir -p rendered
          for name in PKGBUILD .SRCINFO; do
            sed \
              -e "s/VERSION/$VERSION/g" \
              -e "s/SHA256_LINUX_AMD64/$SHA256_LINUX_AMD64/g" \
              -e "s/SHA256_LINUX_ARM64/$SHA256_LINUX_ARM64/g" \
              -e "s/SHA256_LICENSE/$SHA256_LICENSE/g" \
              "aur/$name" > "rendered/$name"
          done

          if grep -qE 'VERSION|SHA256_' rendered/PKGBUILD rendered/.SRCINFO; then
            echo "PKGBUILD/.SRCINFO still contain unrendered placeholders" >&2
            exit 1
          fi
      - name: Push to AUR
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$AUR_SSH_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          # Pin the AUR SSH host key so pushes cannot be redirected via
          # trust-on-first-use. This is the ED25519 key published by the AUR
          # (fingerprint SHA256:RFzBCUItH9LZS0cKB5UE6ceAYhBD5C8GeOBip8Z11+4).
          cat > ~/.ssh/known_hosts <<'EOF'
          aur.archlinux.org ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEuBKrPzbawxA/k2g6NcyV5jmqwJ2s+zpgZGZ7tpLIcN
          EOF
          cat > ~/.ssh/config <<'EOF'
          Host aur.archlinux.org
            User aur
            IdentityFile ~/.ssh/aur
            IdentitiesOnly yes
            HostKeyAlgorithms ssh-ed25519
          EOF
          chmod 600 ~/.ssh/config ~/.ssh/known_hosts

          git clone "ssh://aur@aur.archlinux.org/jwtd-bin.git" aur-repo
          current_srcinfo="aur-repo/.SRCINFO"
          if [ -f "$current_srcinfo" ]; then
            current_version=$(sed -n 's/^[[:space:]]*pkgver = //p' "$current_srcinfo" | head -n1)
            if [ -z "$current_version" ]; then
              echo "Could not determine current AUR package version" >&2
              exit 1
            fi
            if ruby -rrubygems -e 'current = Gem::Version.new(ARGV[0].split("+", 2).first); requested = Gem::Version.new(ARGV[1].split("+", 2).first); exit(current > requested ? 0 : 1)' "$current_version" "$VERSION"; then
              echo "AUR package version $current_version is newer than requested $VERSION; skipping"
              exit 0
            fi
          fi
          cp rendered/PKGBUILD aur-repo/PKGBUILD
          cp rendered/.SRCINFO aur-repo/.SRCINFO
          cd aur-repo
          git add PKGBUILD .SRCINFO
          if git diff --cached --quiet; then
            echo "AUR package is already current"
            exit 0
          else
            diff_status=$?
            if [ "$diff_status" -ne 1 ]; then
              exit "$diff_status"
            fi
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "jwtd $VERSION"
          git push
  update-copr:
    needs: [validate, release]
    if: needs.validate.outputs.prerelease == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Download release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: jwtd-release-assets
          path: artifacts
      - name: Build SRPM
        run: |
          # Verify the prebuilt archives against the signed checksums.txt so the
          # RPM can only wrap the exact binaries this release published. Every
          # file checksums.txt lists is present in the release assets.
          (cd artifacts && sha256sum -c checksums.txt)

          sudo apt-get update
          sudo apt-get install -y rpm

          mkdir -p rpmbuild/SOURCES rpmbuild/SPECS
          cp artifacts/jwtd-linux-amd64.tar.gz artifacts/jwtd-linux-arm64.tar.gz rpmbuild/SOURCES/
          cp LICENSE rpmbuild/SOURCES/LICENSE

          date_str=$(date -u +'%a %b %d %Y')
          sed \
            -e "s/VERSION/$VERSION/g" \
            -e "s/DATE/$date_str/g" \
            copr/jwtd.spec > rpmbuild/SPECS/jwtd.spec
          if grep -qE 'VERSION|DATE' rpmbuild/SPECS/jwtd.spec; then
            echo "Spec still contains unrendered placeholders" >&2
            exit 1
          fi

          rpmbuild --define "_topdir $PWD/rpmbuild" -bs rpmbuild/SPECS/jwtd.spec
      - name: Submit to COPR
        env:
          COPR_CONFIG: ${{ secrets.COPR_API_TOKEN }}
        run: |
          # COPR builds the SRPM in its Fedora chroots and signs the result with
          # its own key; a submitted older version cannot downgrade users because
          # dnf resolves the highest EVR from the repo.
          # copr-cli is pinned: this step holds COPR_API_TOKEN, so an
          # unpinned install would let any future copr-cli release run
          # arbitrary code next to a credential that publishes RPMs. Bump
          # deliberately. Transitive dependencies remain resolved by pip;
          # pinning those too needs a hash-locked requirements file.
          python3 -m venv "$RUNNER_TEMP/copr-venv"
          "$RUNNER_TEMP/copr-venv/bin/pip" install --quiet 'copr-cli==2.5'
          mkdir -p ~/.config
          printf '%s' "$COPR_CONFIG" | base64 -d > ~/.config/copr
          chmod 600 ~/.config/copr
          srpm=$(ls rpmbuild/SRPMS/*.src.rpm)
          "$RUNNER_TEMP/copr-venv/bin/copr-cli" build webcodr/jwtd "$srpm" --nowait
