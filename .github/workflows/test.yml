name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 26.4.0

      - name: Check website JavaScript syntax
        run: node --check site/script.js

      - name: Run website JavaScript tests
        run: node --test site/script.test.js

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "gofmt needed on:" >&2
            echo "$unformatted" >&2
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Run tests
        run: go test -v ./...

      - name: Check GoReleaser configuration
        run: goreleaser check

      # Keyless signing needs an OIDC identity that pull requests from forks
      # cannot obtain, and snapshots are never published, so signing is skipped
      # here. The release workflow exercises the signing path.
      - name: Build GoReleaser snapshot
        run: goreleaser release --snapshot --clean --skip=sign

      - name: Verify GoReleaser artifact contract
        run: |
          expected_archives=(
            "jwtd-linux-amd64.tar.gz"
            "jwtd-linux-arm64.tar.gz"
            "jwtd-darwin-amd64.tar.gz"
            "jwtd-darwin-arm64.tar.gz"
            "jwtd-windows-amd64.tar.gz"
            "jwtd-windows-arm64.tar.gz"
          )

          actual_archives=$(jq -r '[.[] | select(.type == "Archive") | .name] | sort | .[]' dist/artifacts.json)
          expected_sorted=$(printf '%s\n' "${expected_archives[@]}" | sort)
          if [ "$actual_archives" != "$expected_sorted" ]; then
            echo "Unexpected archive set in dist/artifacts.json:" >&2
            echo "$actual_archives" >&2
            exit 1
          fi

          checksum_names=$(jq -r '[.[] | select(.type == "Checksum") | .name] | .[]' dist/artifacts.json)
          if [ "$checksum_names" != "checksums.txt" ]; then
            echo "Expected exactly one checksums.txt Checksum artifact, got:" >&2
            echo "$checksum_names" >&2
            exit 1
          fi

          expected_sboms=()
          for archive in "${expected_archives[@]}"; do
            expected_sboms+=("$archive.sbom.json")
          done
          actual_sboms=$(jq -r '[.[] | select(.type == "SBOM") | .name] | sort | .[]' dist/artifacts.json)
          expected_sboms_sorted=$(printf '%s\n' "${expected_sboms[@]}" | sort)
          if [ "$actual_sboms" != "$expected_sboms_sorted" ]; then
            echo "Unexpected SBOM set in dist/artifacts.json:" >&2
            echo "$actual_sboms" >&2
            exit 1
          fi

          expected_packages=(
            "jwtd-linux-amd64.deb"
            "jwtd-linux-arm64.deb"
            "jwtd-linux-amd64.rpm"
            "jwtd-linux-arm64.rpm"
          )
          actual_packages=$(jq -r '[.[] | select(.type == "Linux Package") | .name] | sort | .[]' dist/artifacts.json)
          expected_packages_sorted=$(printf '%s\n' "${expected_packages[@]}" | sort)
          if [ "$actual_packages" != "$expected_packages_sorted" ]; then
            echo "Unexpected Linux package set in dist/artifacts.json:" >&2
            echo "$actual_packages" >&2
            exit 1
          fi

          scoop_names=$(jq -r '[.[] | select(.type == "Scoop Manifest") | .name] | .[]' dist/artifacts.json)
          if [ "$scoop_names" != "jwtd.json" ]; then
            echo "Expected exactly one jwtd.json Scoop Manifest artifact, got:" >&2
            echo "$scoop_names" >&2
            exit 1
          fi

          # checksums.txt must cover the reproducible artifacts only: the
          # archives and the Linux packages. Including the non-reproducible
          # SBOMs would make the signed checksum file differ on every run and
          # break byte-for-byte release verification.
          checksummed=$(cut -c 67- dist/checksums.txt | sort)
          expected_checksummed=$(printf '%s\n' "${expected_archives[@]}" "${expected_packages[@]}" | sort)
          if [ "$checksummed" != "$expected_checksummed" ]; then
            echo "checksums.txt must cover exactly the archives and Linux packages, got:" >&2
            echo "$checksummed" >&2
            exit 1
          fi

          for archive in "${expected_archives[@]}"; do
            case "$archive" in
              *windows*) expected_entry="jwtd.exe" ;;
              *) expected_entry="jwtd" ;;
            esac
            entries=$(tar -tzf "dist/$archive")
            if [ "$entries" != "$expected_entry" ]; then
              echo "Archive $archive must contain only $expected_entry, got:" >&2
              echo "$entries" >&2
              exit 1
            fi
          done

          (cd dist && sha256sum --check checksums.txt)
