version: 2
project_name: jwtd

builds:
  - id: jwtd
    main: .
    binary: jwtd
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: jwtd
    ids:
      - jwtd
    formats:
      - tar.gz
    name_template: "jwtd-{{ .Os }}-{{ .Arch }}"
    files:
      - none*
    builds_info:
      owner: root
      group: root
      mtime: "1970-01-01T00:00:00Z"

checksum:
  name_template: checksums.txt
  algorithm: sha256
  # Restrict the checksum file to the archives. Syft SBOMs embed a random
  # documentNamespace UUID and a creation timestamp, so including them would
  # make checksums.txt itself non-reproducible and break the release job's
  # byte-for-byte rerun verification of the file Cosign signs.
  ids:
    - jwtd

sboms:
  - id: archive
    artifacts: archive

# Signing the checksum file transitively covers every artifact it lists.
# Keyless (OIDC) signing works in CI only; local runs use --skip=sign.
signs:
  - id: checksum
    cmd: cosign
    artifacts: checksum
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"

changelog:
  disable: true

release:
  disable: true
